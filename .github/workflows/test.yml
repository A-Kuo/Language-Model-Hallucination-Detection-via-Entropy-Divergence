name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest

      - name: Run v1 pytest tests (numpy-only)
        run: pytest v1/test_attention_analyzer.py -v

      - name: Run v2 pytest tests (numpy-only)
        run: pytest v2/test_feature_engineer.py v2/test_detector.py -v

      - name: Run v1 self-tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python v1/hypothesis_test.py
          python v1/confidence_calibrator.py

      - name: Run v2 self-tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python v2/feature_engineer.py
          python v2/detector.py
          python v2/data_generator.py

      - name: Run v2 synthetic pipeline
        env:
          PYTHONIOENCODING: utf-8
        run: python v2/pipeline.py --synthetic --num_samples 200
